services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5057:5057"
    environment:
      - DB_URL=${DB_URL}
      - XAI_API_KEY=${XAI_API_KEY:-}
      - XAI_BASE_URL=${XAI_BASE_URL:-https://api.x.ai/v1}
      - XAI_MODEL=${XAI_MODEL:-grok-4-fast-reasoning}
      - XAI_AGENT_MODEL=${XAI_AGENT_MODEL:-grok-4}
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-local}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-BAAI/bge-small-en-v1.5}
      - EMBEDDING_DIM=${EMBEDDING_DIM:-384}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - APP_ENV=${APP_ENV:-production}
      - APP_SECRET=${APP_SECRET:-change-me}
      - BRICKSMITH_SKIP_MIGRATE=${BRICKSMITH_SKIP_MIGRATE:-0}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5057/').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

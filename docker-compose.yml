# Bricksmith — docker-compose for Coolify (or standalone).
#
# Coolify picks this up automatically when you select "Docker Compose" as
# the deployment type. Set the environment variables in the Coolify UI,
# or export them in a local .env before `docker compose up`.
#
# After the first deploy you still need to seed synthetic data ONCE:
#   docker compose exec web python -m synthetic.generate --seed 42
# Migrations run automatically on every start (see docker-entrypoint.sh).

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: bricksmith:latest
    restart: unless-stopped
    environment:
      # Required — point at your Postgres (pgvector extension required).
      DB_URL: ${DB_URL}
      XAI_API_KEY: ${XAI_API_KEY}
      # Optional — all have sensible defaults
      XAI_BASE_URL: ${XAI_BASE_URL:-https://api.x.ai/v1}
      XAI_MODEL: ${XAI_MODEL:-grok-4-fast-reasoning}
      XAI_AGENT_MODEL: ${XAI_AGENT_MODEL:-grok-4}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-local}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-BAAI/bge-small-en-v1.5}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-384}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      APP_ENV: ${APP_ENV:-production}
      APP_SECRET: ${APP_SECRET:?APP_SECRET must be set to a random string}
      PORT: "5057"
      # Set to 1 if the DB user lacks CREATE privileges (migration pre-run manually).
      BRICKSMITH_SKIP_MIGRATE: ${BRICKSMITH_SKIP_MIGRATE:-0}
    ports:
      - "${HOST_PORT:-5057}:5057"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5057/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s
    labels:
      # Coolify reads these to wire up its reverse proxy (if you override the
      # defaults in the UI this is ignored — safe to leave in place).
      coolify.managed: "true"
      coolify.type: "application"
